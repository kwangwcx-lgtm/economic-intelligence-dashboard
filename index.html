
<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>經濟指標監控儀表板 · Live Data v6</title>
  <!-- Lightweight Charts Library -->
  <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f5f5f7;
      --surface-warm: #fbfbfd;
      --fg: #1d1d1f;
      --fg-2: #424245;
      --muted: #6e6e73;
      --meta: #86868b;
      --border: #d2d2d7;
      --border-soft: #e8e8ed;
      --accent: #0071e3;
      --accent-on: #ffffff;
      --font-display: "SF Pro Display", -apple-system, BlinkMacSystemFont, sans-serif;
      --font-body: "SF Pro Text", -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: "SF Mono", ui-monospace, monospace;
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-pill: 980px;
      --elev-raised: 0 12px 32px rgba(0, 0, 0, 0.08);
      --container-max: 800px;
    }

    body { margin: 0; background: var(--bg); color: var(--fg); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
    .container { max-width: var(--container-max); margin-inline: auto; padding-inline: 20px; }
    
    .topnav { position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-soft); padding-block: 14px; }
    .topnav-inner { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-weight: 600; font-size: 18px; letter-spacing: -0.02em; }
    
    .actions { display: flex; gap: 12px; align-items: center; }
    .btn-action { background: var(--fg); color: var(--bg); border: none; padding: 6px 14px; border-radius: var(--radius-pill); font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn-action:hover { opacity: 0.8; }
    .btn-secondary { background: var(--surface); color: var(--fg); border: 1px solid var(--border-soft); }

    .hero { padding-block: 40px 20px; text-align: left; }
    .hero h1 { font-family: var(--font-display); font-size: 32px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.015em; }
    .hero p { color: var(--muted); font-size: 17px; margin: 0; }

    .indicator-stack { display: flex; flex-direction: column; gap: 24px; padding-bottom: 80px; }
    .card { background: var(--bg); border: 1px solid var(--border-soft); border-radius: var(--radius-lg); padding: 24px; transition: all 0.3s ease; position: relative; }
    .card:hover { border-color: var(--border); box-shadow: var(--elev-raised); }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .card-title-group { display: flex; flex-direction: column; gap: 2px; }
    .card-label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; }
    .card-title { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
    
    .release-tag { text-align: right; background: var(--surface-warm); padding: 8px 14px; border-radius: 12px; border: 1px solid var(--border-soft); }
    .release-label { font-size: 10px; font-weight: 700; color: var(--meta); text-transform: uppercase; margin-bottom: 2px; display: block; }
    .release-time { font-size: 12px; font-weight: 600; color: var(--fg); }
    .release-countdown { font-size: 12px; color: var(--accent); font-weight: 700; margin-top: 2px; }

    .card-main { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 12px; margin-bottom: 24px; align-items: baseline; }
    .stat-box { display: flex; flex-direction: column; gap: 4px; }
    .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; }
    .stat-value { font-family: var(--font-display); font-size: 32px; font-weight: 700; line-height: 1; }
    .stat-value.sub { font-size: 22px; color: var(--fg-2); }
    .stat-status { font-size: 10px; font-weight: 700; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
    .live-dot { width: 6px; height: 6px; background: #16a34a; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
    .offline-dot { width: 6px; height: 6px; background: var(--meta); border-radius: 50%; display: inline-block; }

    .chart-container { width: 100%; height: 320px; background: var(--surface-warm); border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-soft); margin-top: 16px; position: relative; }
    .chart-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--surface-warm); color: var(--meta); font-size: 13px; z-index: 5; }

    /* Settings Modal */
    #settings-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
    .modal-content { background: var(--bg); padding: 32px; border-radius: 24px; width: 90%; max-width: 440px; box-shadow: var(--elev-raised); }
    .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
    .field-group { margin-bottom: 20px; }
    .field-label { font-size: 12px; font-weight: 600; color: var(--fg-2); margin-bottom: 6px; display: block; }
    .input-text { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); font-family: var(--font-mono); font-size: 13px; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    @media (max-width: 600px) {
      .card-main { grid-template-columns: 1fr 1fr; }
      .stat-box:last-child { grid-column: span 2; border-top: 1px solid var(--border-soft); padding-top: 12px; }
      .release-tag { text-align: left; width: 100%; }
    }
  </style>
</head>
<body>
  <nav class="topnav">
    <div class="container topnav-inner">
      <div class="logo">Economic Intelligence</div>
      <div class="actions">
        <button class="btn-action btn-secondary" onclick="toggleSettings()">API 金鑰設定</button>
        <button class="btn-action" onclick="refreshAll()">手動刷新數據</button>
      </div>
    </div>
  </nav>

  <main>
    <div class="container hero">
      <h1>即時數據監測面板</h1>
      <p>已整合您的 FRED API 金鑰，正自動同步最新經濟數據。 (台灣時間 CST)</p>
    </div>

    <div class="container indicator-stack" id="indicator-list"></div>
  </main>

  <!-- Settings Modal -->
  <div id="settings-modal">
    <div class="modal-content">
      <div class="modal-title">API 金鑰設定</div>
      <p style="font-size: 13px; color: var(--muted); margin-bottom: 20px;">
        您的 API 金鑰已預填並儲存於瀏覽器中。
      </p>
      <div class="field-group">
        <label class="field-label">FRED API KEY</label>
        <input type="password" id="fred-key-input" class="input-text" placeholder="貼上您的 API Key">
      </div>
      <div class="modal-actions">
        <button class="btn-action btn-secondary" onclick="toggleSettings()">關閉</button>
        <button class="btn-action" onclick="saveSettings()">儲存設定</button>
      </div>
    </div>
  </div>

  <script>
    // User Provided API Key
    const DEFAULT_FRED_KEY = 'b9302ae1ef44eb9130f8f90da9cfbba4';
    
    // Initialize Local Storage if empty
    if (!localStorage.getItem('fred_api_key')) {
      localStorage.setItem('fred_api_key', DEFAULT_FRED_KEY);
    }

    const INDICATORS = [
      { id: 'cpi', name: 'CPI 消費者物價指數 (YoY)', fredId: 'CPIAUCSL', forecast: 3.3, prev: 3.5, unit: '%', nextRelease: '2026-06-10T20:30:00', color: '#0071e3', volatility: 0.04 },
      { id: 'ppi', name: 'PPI 生產者物價指數 (YoY)', fredId: 'PPIACO', forecast: 2.1, prev: 2.3, unit: '%', nextRelease: '2026-06-11T20:30:00', color: '#0071e3', volatility: 0.06 },
      { id: 'pce', name: 'PCE 個人消費支出 (YoY)', fredId: 'PCEPI', forecast: 2.6, prev: 2.8, unit: '%', nextRelease: '2026-06-26T20:30:00', color: '#0071e3', volatility: 0.03 },
      { id: 'vix', name: 'VIX 恐慌指數', yahooId: '^VIX', forecast: 15.10, prev: 13.80, unit: '', nextRelease: null, color: '#1d1d1f', volatility: 0.8 },
      { id: 'yield', name: '10 年期美國公債殖利率', yahooId: '^TNX', forecast: 4.200, prev: 4.310, unit: '%', nextRelease: null, color: '#1d1d1f', volatility: 0.02 }
    ];

    const charts = {};

    // --- Data Fetching Engine ---

    async function fetchFredData(indicator) {
      const apiKey = localStorage.getItem('fred_api_key');
      if (!apiKey) return null;
      
      try {
        // Fetch last 500 points with YoY unit (pc1)
        const url = `https://corsproxy.io/?${encodeURIComponent(`https://api.stlouisfed.org/fred/series/observations?series_id=${indicator.fredId}&api_key=${apiKey}&file_type=json&units=pc1&sort_order=desc&limit=500`)}`;
        const res = await fetch(url);
        const json = await res.json();
        
        if (!json.observations) return null;

        const data = json.observations.map(obs => ({
          time: obs.date,
          value: parseFloat(obs.value)
        })).filter(d => !isNaN(d.value)).reverse();

        return {
          current: data[data.length - 1].value,
          history: data
        };
      } catch (e) {
        console.error(`FRED fetch error for ${indicator.id}:`, e);
        return null;
      }
    }

    async function fetchYahooData(indicator) {
      try {
        const url = `https://corsproxy.io/?${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${indicator.yahooId}?interval=1d&range=1y`)}`;
        const res = await fetch(url);
        const json = await res.json();
        const result = json.chart.result[0];
        const prices = result.indicators.quote[0].close;
        const timestamps = result.timestamp;
        
        const data = timestamps.map((ts, i) => ({
          time: new Date(ts * 1000).toISOString().split('T')[0],
          value: parseFloat(prices[i]?.toFixed(3) || 0)
        })).filter(d => d.value > 0);

        return {
          current: data[data.length - 1].value,
          history: data
        };
      } catch (e) {
        console.error(`Yahoo fetch error for ${indicator.id}:`, e);
        return null;
      }
    }

    // --- UI Logic ---

    function getCountdown(releaseStr) {
      if (!releaseStr) return '即時數據同步中';
      const diff = new Date(releaseStr) - new Date(); // Use real now for live
      if (diff < 0) return '數據發布中...';
      const d = Math.floor(diff / 86400000), h = Math.floor((diff % 86400000) / 3600000), m = Math.floor((diff % 3600000) / 60000);
      return d > 0 ? `倒數 ${d}天 ${h}時` : `倒數 ${h}時 ${m}分`;
    }

    function toggleSettings() {
      const modal = document.getElementById('settings-modal');
      const input = document.getElementById('fred-key-input');
      input.value = localStorage.getItem('fred_api_key') || '';
      modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
    }

    function saveSettings() {
      const input = document.getElementById('fred-key-input');
      localStorage.setItem('fred_api_key', input.value);
      toggleSettings();
      refreshAll();
    }

    async function refreshAll() {
      for (const ind of INDICATORS) {
        updateIndicator(ind);
      }
    }

    async function updateIndicator(ind) {
      const card = document.getElementById(`card-${ind.id}`);
      const valEl = card.querySelector('.stat-value-main');
      const statusEl = card.querySelector('.stat-status');
      const loadingEl = card.querySelector('.chart-loading');

      let result = null;
      if (ind.fredId) result = await fetchFredData(ind);
      else if (ind.yahooId) result = await fetchYahooData(ind);

      if (result) {
        valEl.textContent = `${result.current.toFixed(2)}${ind.unit}`;
        statusEl.innerHTML = `<span class="live-dot"></span> <span style="color:#16a34a">已連線至最新數據</span>`;
        loadingEl.style.display = 'none';
        
        // Update Chart
        const series = charts[ind.id].series;
        series.setData(result.history);
        charts[ind.id].chart.timeScale().fitContent();
      } else {
        statusEl.innerHTML = `<span class="offline-dot"></span> <span style="color:var(--meta)">離線模式 (API 錯誤或連線中)</span>`;
      }
    }

    function createIndicatorCard(ind) {
      const container = document.getElementById('indicator-list');
      const card = document.createElement('div');
      card.className = 'card';
      card.id = `card-${ind.id}`;
      card.innerHTML = `
        <div class="card-header">
          <div class="card-title-group">
            <span class="card-label">${ind.fredId ? 'FRED 官方數據' : '市場即時報價'}</span>
            <div class="card-title">${ind.name}</div>
          </div>
          <div class="release-tag">
            <span class="release-label">下次發佈 (台灣時間)</span>
            <div class="release-time">${ind.nextRelease ? ind.nextRelease.replace('T', ' ') : '24/7 即時同步'}</div>
            <div class="release-countdown">${getCountdown(ind.nextRelease)}</div>
          </div>
        </div>

        <div class="card-main">
          <div class="stat-box">
            <span class="stat-label">當前數據</span>
            <span class="stat-value stat-value-main" style="color: ${ind.color}">...</span>
            <div class="stat-status"><span class="offline-dot"></span> 正在讀取...</div>
          </div>
          <div class="stat-box">
            <span class="stat-label">市場預測</span>
            <span class="stat-value sub">${ind.forecast}${ind.unit}</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">前期數據</span>
            <span class="stat-value sub" style="color:var(--meta)">${ind.prev}${ind.unit}</span>
          </div>
        </div>

        <div class="chart-container">
          <div class="chart-loading">數據加載中...</div>
          <div id="chart-root-${ind.id}" style="width:100%; height:100%"></div>
        </div>
      `;
      container.appendChild(card);

      // Initialize Chart
      const chartRoot = document.getElementById(`chart-root-${ind.id}`);
      const chart = LightweightCharts.createChart(chartRoot, {
        layout: { background: { color: 'transparent' }, textColor: '#86868b', fontSize: 11 },
        grid: { vertLines: { color: '#f5f5f7' }, horzLines: { color: '#f5f5f7' } },
        rightPriceScale: { borderVisible: false, scaleMargins: { top: 0.2, bottom: 0.2 } },
        timeScale: { borderVisible: false },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal }
      });

      const series = chart.addAreaSeries({
        lineColor: ind.color,
        topColor: ind.color + '22',
        bottomColor: ind.color + '00',
        lineWidth: 2,
        priceFormat: { type: 'price', precision: 3, minMove: 0.001 }
      });

      charts[ind.id] = { chart, series };

      // Initial simulation while loading
      series.setData(generateSimulation(ind.forecast, ind.volatility, 100));
      chart.timeScale().fitContent();

      // Observer for resize
      new ResizeObserver(() => {
        chart.applyOptions({ width: chartRoot.clientWidth, height: chartRoot.clientHeight });
        chart.timeScale().fitContent();
      }).observe(chartRoot);
    }

    function generateSimulation(current, vol, days) {
      let data = [], val = current;
      for (let i = 0; i < days; i++) {
        const d = new Date();
        d.setDate(d.getDate() - (days - i));
        data.push({ time: d.toISOString().split('T')[0], value: val });
        val += (Math.random() - 0.5) * vol;
      }
      return data;
    }

    // Run Initialization
    INDICATORS.forEach(createIndicatorCard);
    refreshAll();

    // Refresh countdowns every minute
    setInterval(() => {
      INDICATORS.forEach(ind => {
        const card = document.getElementById(`card-${ind.id}`);
        card.querySelector('.release-countdown').textContent = getCountdown(ind.nextRelease);
      });
    }, 60000);

  </script>
</body>
</html>
