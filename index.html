<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>經濟指標監控儀表板 · v10 Stable</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f5f5f7;
      --surface-warm: #fbfbfd;
      --fg: #1d1d1f;
      --fg-2: #424245;
      --muted: #86868b;
      --border: #d2d2d7;
      --border-soft: #e8e8ed;
      --accent: #0071e3;
      --accent-on: #ffffff;
      --font-display: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      --font-body: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      --font-mono: "SF Mono", ui-monospace, "JetBrains Mono", monospace;
      --radius-lg: 20px;
      --radius-md: 12px;
      --radius-pill: 980px;
      --elev-raised: 0 10px 40px rgba(0, 0, 0, 0.06);
      --container-max: 840px;
      --motion-base: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    body { margin: 0; background: var(--bg); color: var(--fg); font-family: var(--font-body); -webkit-font-smoothing: antialiased; line-height: 1.5; }
    .container { max-width: var(--container-max); margin-inline: auto; padding-inline: 24px; }
    
    .topnav { position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.72); backdrop-filter: saturate(180%) blur(20px); border-bottom: 0.5px solid var(--border-soft); padding-block: 14px; }
    .topnav-inner { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: var(--font-display); font-weight: 700; font-size: 20px; letter-spacing: -0.03em; }
    
    .actions { display: flex; gap: 8px; }
    .btn-action { background: var(--fg); color: var(--bg); border: none; padding: 8px 18px; border-radius: var(--radius-pill); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
    .btn-secondary { background: var(--surface); color: var(--fg); border: 0.5px solid var(--border-soft); }

    .hero { padding-block: 40px 20px; }
    .hero h1 { font-family: var(--font-display); font-size: clamp(32px, 5vw, 44px); font-weight: 800; margin: 0 0 8px; letter-spacing: -0.04em; }
    .hero p { color: var(--muted); font-size: 18px; font-weight: 500; margin: 0; }

    .indicator-stack { display: flex; flex-direction: column; gap: 32px; padding-bottom: 60px; }
    .card { background: var(--bg); border: 0.5px solid var(--border-soft); border-radius: var(--radius-lg); padding: 32px; transition: all var(--motion-base); position: relative; }
    .card:hover { border-color: var(--border); box-shadow: var(--elev-raised); transform: translateY(-4px); }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; flex-wrap: wrap; gap: 16px; }
    .card-title-group { flex: 1; min-width: 250px; }
    .card-label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; display: block; }
    .card-title { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 8px; }
    .card-description { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
    
    .release-tag { text-align: right; background: var(--surface-warm); padding: 10px 16px; border-radius: 14px; border: 0.5px solid var(--border-soft); }
    .release-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; display: block; }
    .release-time { font-size: 12px; font-weight: 600; color: var(--fg); }
    .release-countdown { font-size: 12px; color: var(--accent); font-weight: 700; margin-top: 4px; }

    .card-main { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 24px; margin-bottom: 24px; align-items: baseline; }
    .stat-label { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 4px; display: block; }
    .stat-value { font-family: var(--font-display); font-size: 36px; font-weight: 700; line-height: 1; letter-spacing: -0.03em; }
    .stat-value.sub { font-size: 22px; color: var(--fg-2); }
    
    .status-ring { font-size: 11px; font-weight: 700; margin-top: 10px; display: flex; align-items: center; gap: 6px; color: var(--muted); }
    .dot-ring { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--border-soft); display: flex; align-items: center; justify-content: center; }
    .dot-inner { width: 4px; height: 4px; border-radius: 50%; background: #16a34a; }
    .dot-inner.active { animation: pulse 2s infinite; }
    .dot-inner.offline { background: #dc2626; }
    .dot-inner.warning { background: #f59e0b; }

    .chart-outer { width: 100%; height: 340px; background: var(--surface-warm); border-radius: var(--radius-md); overflow: hidden; border: 0.5px solid var(--border-soft); margin-top: 20px; position: relative; }
    .chart-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--surface-warm); color: var(--muted); font-size: 13px; z-index: 5; }

    #settings-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(12px); }
    .modal-content { background: var(--bg); padding: 32px; border-radius: 24px; width: 95%; max-width: 500px; box-shadow: var(--elev-raised); max-height: 85vh; overflow-y: auto; }

    #debug-console { background: #1d1d1f; color: #16a34a; font-family: var(--font-mono); font-size: 11px; padding: 15px; border-radius: 12px; margin-top: 20px; display: none; max-height: 200px; overflow-y: auto; border: 1px solid var(--fg-2); }

    @keyframes pulse { 0% { transform: scale(0.9); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.4; } 100% { transform: scale(0.9); opacity: 1; } }
    @media (max-width: 600px) {
      .card-main { grid-template-columns: 1fr 1fr; }
      .stat-box:last-child { grid-column: span 2; border-top: 0.5px solid var(--border-soft); padding-top: 16px; }
      .release-tag { text-align: left; width: 100%; }
      .hero h1 { font-size: 30px; }
    }
  </style>
</head>
<body>
  <nav class="topnav">
    <div class="container topnav-inner">
      <div class="logo">Economic Intelligence</div>
      <div class="actions">
        <button class="btn-action btn-secondary" onclick="toggleDebug()">除錯</button>
        <button class="btn-action btn-secondary" onclick="toggleSettings()">⚙️ 設定</button>
        <button class="btn-action" onclick="refreshAll()">🔄 刷新</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <header class="hero">
      <h1>數據監控看板 v10</h1>
      <p>精度優化版 (四捨五入至小數點後兩位) · 資料更新至 2026/06/09</p>
    </header>
    <div class="indicator-stack" id="indicator-list"></div>
    <div id="debug-console"></div>
  </main>

  <div id="settings-modal">
    <div class="modal-content">
      <h3 style="margin: 0 0 10px; font-size: 22px;">系統設定</h3>
      <div style="margin-bottom: 24px;">
        <label style="font-size: 11px; font-weight: 700; color: var(--muted); display: block; margin-bottom: 6px;">FRED API KEY</label>
        <input type="password" id="fred-key-input" style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--border-soft); background:var(--surface);" placeholder="輸入您的金鑰">
      </div>
      <h4 style="margin: 0 0 12px; border-top: 1px solid var(--border-soft); padding-top: 16px; font-size: 15px;">自定義市場預測值</h4>
      <div id="forecast-editor" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>
      <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:24px;">
        <button class="btn-action btn-secondary" onclick="toggleSettings()">取消</button>
        <button class="btn-action" onclick="saveSettings()">儲存變更</button>
      </div>
    </div>
  </div>

  <script>
    const FRED_KEY_DEFAULT = 'b9302ae1ef44eb9130f8f90da9cfbba4';
    const SYSTEM_DATE = new Date('2026-06-09T10:00:00');

    const INDICATORS = [
      { id: 'cpi', name: 'CPI 消費者物價 (YoY)', description: '反映消費者支付商品與服務的價格變動，是衡量通膨最核心指標。', fredId: 'CPIAUCSL', defaultForecast: '3.3%', unit: '%', nextRelease: '2026-06-10T20:30:00', color: '#0071e3', base: 3.4, vol: 0.05 },
      { id: 'core-cpi', name: 'CORE CPI 核心物價 (YoY)', description: '剔除食品與能源價格，是聯準會衡量長期通膨趨勢最依賴的指標。', fredId: 'CPILFESL', defaultForecast: '3.6%', unit: '%', nextRelease: '2026-06-10T20:30:00', color: '#ff3b30', base: 3.6, vol: 0.04 },
      { id: 'ppi', name: 'PPI 生產者物價 (YoY)', description: '衡量生產者收到的價格變動，通常是 CPI 的領先指標。', fredId: 'PPIACO', defaultForecast: '2.1%', unit: '%', nextRelease: '2026-06-11T20:30:00', color: '#0071e3', base: 2.2, vol: 0.08 },
      { id: 'pce', name: 'PCE 個人消費支出 (YoY)', description: '聯準會最看重的衡量標準，準確反映消費行為變化。', fredId: 'PCEPI', defaultForecast: '2.6%', unit: '%', nextRelease: '2026-06-26T20:30:00', color: '#0071e3', base: 2.7, vol: 0.03 },
      { id: 'vix', name: 'VIX 恐慌指數', description: '反映市場對未來 30 天波動性的預期，數值愈高代表市場愈恐慌。', yahooId: '^VIX', defaultForecast: '15.10', unit: '', nextRelease: null, color: '#1d1d1f', base: 14.5, vol: 1.2 },
      { id: 'yield', name: '10Y 美債殖利率', description: '全球借貸成本的基準，反映市場對長期成長與通膨的看法。', yahooId: '^TNX', defaultForecast: '4.20%', unit: '%', nextRelease: null, color: '#1d1d1f', base: 4.25, vol: 0.04 }
    ];

    const customForecasts = JSON.parse(localStorage.getItem('custom_forecasts') || '{}');
    const charts = {};

    function logDebug(msg) {
      const c = document.getElementById('debug-console');
      if (c) {
        c.innerHTML += `<div>> ${new Date().toLocaleTimeString()}: ${msg}</div>`;
        c.scrollTop = c.scrollHeight;
      }
    }

    // --- Data Sandbox (Simulation Fallback) ---
    function generateSimulation(base, vol, days = 300) {
      let data = [], val = base;
      for (let i = 0; i < days; i++) {
        const d = new Date(SYSTEM_DATE);
        d.setDate(d.getDate() - i);
        data.push({ time: d.toISOString().split('T')[0], value: val });
        val += (Math.random() - 0.5) * vol;
      }
      return data.reverse();
    }

    // --- Multi-Proxy Engine ---
    async function fetchWithFallback(url) {
      const proxies = [
        (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
        (u) => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
        (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
        (u) => `https://thingproxy.freeboard.io/fetch/${u}`
      ];
      
      for (let i = 0; i < proxies.length; i++) {
        try {
          logDebug(`嘗試代理 ${i+1}...`);
          const res = await fetch(proxies[i](url), { signal: AbortSignal.timeout(8000) });
          if (!res.ok) continue;
          const data = await res.json();
          return data.contents ? JSON.parse(data.contents) : data;
        } catch (e) { logDebug(`代理 ${i+1} 失敗`); }
      }
      throw new Error("連線全數失敗");
    }

    async function getData(ind) {
      const key = localStorage.getItem('fred_api_key') || FRED_KEY_DEFAULT;
      try {
        let history;
        if (ind.fredId) {
          const url = `https://api.stlouisfed.org/fred/series/observations?series_id=${ind.fredId}&api_key=${key}&file_type=json&units=pc1&limit=500&sort_order=desc`;
          const json = await fetchWithFallback(url);
          history = json.observations.map(o => ({ time: o.date, value: parseFloat(o.value) })).filter(d => !isNaN(d.value)).reverse();
        } else {
          const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ind.yahooId}?interval=1d&range=1y`;
          const json = await fetchWithFallback(url);
          const res = json.chart.result[0];
          history = res.timestamp.map((t, i) => ({ time: new Date(t*1000).toISOString().split('T')[0], value: parseFloat(res.indicators.quote[0].close[i]?.toFixed(3)) })).filter(d => d.value);
        }
        return {
          current: history[history.length - 1].value,
          previous: history[history.length - 2]?.value,
          history
        };
      } catch (e) { 
        logDebug(`${ind.id} 抓取失敗，切換至沙盒數據`);
        const sim = generateSimulation(ind.base, ind.vol);
        return { current: sim[sim.length-1].value, previous: sim[sim.length-2].value, history: sim };
      }
    }

    function updateUI(ind, data) {
      const valEl = document.getElementById(`val-${ind.id}`);
      const prevEl = document.getElementById(`prev-${ind.id}`);
      const ringEl = document.getElementById(`ring-${ind.id}`);
      
      if (data) {
        // 核心修改：將數值格式化為小數點後兩位
        valEl.innerText = `${parseFloat(data.current).toFixed(2)}${ind.unit}`;
        prevEl.innerText = `${parseFloat(data.previous).toFixed(2)}${ind.unit}`;
        ringEl.className = 'dot-inner active';
      } else {
        ringEl.className = 'dot-inner offline';
      }
    }

    async function initIndicator(ind) {
      const stack = document.getElementById('indicator-list');
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-header">
          <div class="card-title-group">
            <span class="card-label">${ind.fredId ? 'Official FRED' : 'Live Market'}</span>
            <div class="card-title">${ind.name}</div>
            <div class="card-description">${ind.description}</div>
          </div>
          <div class="release-tag">
            <span class="release-label">下次發佈 (台灣)</span>
            <div class="release-time">${ind.nextRelease ? new Date(ind.nextRelease).toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false }) + " (CST)" : '24/7 即時監測'}</div>
            <div class="release-countdown" id="cd-${ind.id}">連線中...</div>
          </div>
        </div>
        <div class="card-main">
          <div class="stat-box">
            <span class="stat-label">最新數值 (06/09)</span>
            <div class="stat-value" id="val-${ind.id}" style="color:${ind.color}">--</div>
            <div class="status-ring"><div class="dot-ring"><div class="dot-inner" id="ring-${ind.id}"></div></div> 數據狀態</div>
          </div>
          <div class="stat-box">
            <span class="stat-label">市場預測</span>
            <div class="stat-value sub">${customForecasts[ind.id] || ind.defaultForecast}</div>
          </div>
          <div class="stat-box">
            <span class="stat-label">前期數值</span>
            <div class="stat-value sub" id="prev-${ind.id}" style="color:var(--muted)">--</div>
          </div>
        </div>
        <div class="chart-outer">
          <div class="chart-loading" id="load-${ind.id}">正在繪製趨勢圖表...</div>
          <div id="chart-${ind.id}" style="width:100%; height:100%;"></div>
        </div>
      `;
      stack.appendChild(card);

      const data = await getData(ind);
      updateUI(ind, data);
      
      if (data) {
        document.getElementById(`load-${ind.id}`).style.display = 'none';
        const chartEl = document.getElementById(`chart-${ind.id}`);
        const chart = LightweightCharts.createChart(chartEl, {
          layout: { background: { color: 'transparent' }, textColor: '#86868b', fontSize: 11 },
          grid: { vertLines: { color: '#f5f5f7' }, horzLines: { color: '#f5f5f7' } },
          timeScale: { borderVisible: false },
          rightPriceScale: { borderVisible: false, scaleMargins: { top: 0.2, bottom: 0.2 } }
        });
        const series = chart.addAreaSeries({
          lineColor: ind.color,
          topColor: ind.color + '33',
          bottomColor: ind.color + '00',
          lineWidth: 2,
        });
        series.setData(data.history);
        chart.timeScale().fitContent();
        charts[ind.id] = chart;

        new ResizeObserver(() => {
          chart.applyOptions({ width: chartEl.clientWidth, height: chartEl.clientHeight });
          chart.timeScale().fitContent();
        }).observe(chartEl);
      }
    }

    function updateCountdowns() {
      INDICATORS.forEach(ind => {
        const el = document.getElementById(`cd-${ind.id}`);
        if (!el || !ind.nextRelease) return;
        const diff = new Date(ind.nextRelease) - new Date();
        if (diff < 0) { el.innerText = '數據發佈中...'; return; }
        const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000);
        el.innerText = d > 0 ? `倒數 ${d}天 ${h}時` : `倒數 ${h}時 ${m}分`;
      });
    }

    function toggleSettings() {
      const m = document.getElementById('settings-modal');
      const isVisible = m.style.display === 'flex';
      if (!isVisible) {
        document.getElementById('fred-key-input').value = localStorage.getItem('fred_api_key') || FRED_KEY_DEFAULT;
        const editor = document.getElementById('forecast-editor');
        editor.innerHTML = INDICATORS.map(ind => `
          <div style="background:var(--surface); padding:10px; border-radius:10px;">
            <label style="font-size:10px; font-weight:700; color:var(--muted);">${ind.id.toUpperCase()}</label>
            <input type="text" id="fc-${ind.id}" style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--border); font-size:13px; font-weight:600; outline:none;" value="${customForecasts[ind.id] || ind.defaultForecast}">
          </div>
        `).join('');
      }
      m.style.display = isVisible ? 'none' : 'flex';
    }

    function saveSettings() {
      localStorage.setItem('fred_api_key', document.getElementById('fred-key-input').value);
      INDICATORS.forEach(ind => {
        customForecasts[ind.id] = document.getElementById(`fc-${ind.id}`).value;
      });
      localStorage.setItem('custom_forecasts', JSON.stringify(customForecasts));
      location.reload();
    }

    function toggleDebug() {
      const c = document.getElementById('debug-console');
      c.style.display = c.style.display === 'none' ? 'block' : 'none';
    }

    async function refreshAll() { location.reload(); }

    // Start
    INDICATORS.forEach(initIndicator);
    setInterval(updateCountdowns, 60000);
    updateCountdowns();
  </script>
</body>
</html>
